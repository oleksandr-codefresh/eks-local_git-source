apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-rollout-csdp
spec:
  project: default
  source:
    path: guestbook-rollout
    repoURL: https://github.com/oleksandr-codefresh/argocd-example-apps
    targetRevision: personal-eks
  destination:
    namespace: eks-local
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
