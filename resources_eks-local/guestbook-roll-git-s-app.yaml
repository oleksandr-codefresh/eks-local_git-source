apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-roll-git-s-app
spec:
  project: default
  source:
    path: app-resources-definitions/guestbook-rollout-git-source-app
    repoURL: https://github.com/oleksandr-codefresh/eks-local_git-source
    targetRevision: main
  destination:
    namespace: eks-local
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
