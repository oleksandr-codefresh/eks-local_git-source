apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-rollouts-demo-git-s
spec:
  project: default
  source:
    path: prometheus-rollouts-demo
    repoURL: https://github.com/pasha-codefresh/k3s-argo-rollouts
    targetRevision: master
  destination:
    namespace: eks-local
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
