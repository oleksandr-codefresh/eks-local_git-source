apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-guestbook-git-source-2
spec:
  project: default
  source:
    path: helm-guestbook-git-source
    repoURL: https://github.com/oleksandr-codefresh/argocd-example-apps
    targetRevision: personal-eks
  destination:
    namespace: eks-local
    server: https://AA611FCEF4319CDD76794F68BEB4ACEC.gr7.us-east-1.eks.amazonaws.com
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
